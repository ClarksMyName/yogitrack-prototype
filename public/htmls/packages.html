<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YogiTrack • Packages</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="layout--sidebar">

  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/Logo.png" class="logo">
    </a>

    <nav class="nav">
      <a href="instructor.html">Instructors</a>
      <a href="packages.html">Packages</a>
      <a href="class-schedule.html">Class Schedule</a>
      <a href="customers.html">Customers</a>
      <a href="check-ins.html">Check-ins</a>
      <a href="../index.html">Log Out</a>
    </nav>
  </aside>

  <main class="layout--center">
    <form class="card" id="packageForm">
      <h2>Package Details</h2>

      <label>Package ID
        <select id="packageId" class="form-input">
          <option value="">-- Select Package --</option>
        </select>
      </label>

      <label>Package Name
        <input type="text" id="packageName">
      </label>

      <label>Description
        <textarea id="description"></textarea>
      </label>

      <label>Price
        <input type="number" id="price">
      </label>

      <div class="btn-row">
        <button type="button" class="btn">Search</button>
        <button type="button" class="btn btn--primary">Add New</button>
        <button type="button" class="btn">Save</button>
        <button type="button" class="btn btn--danger">Delete</button>
        <button type="button" class="btn">Clear</button>
        <a href="dashboard.html" class="btn">Exit</a>
      </div>

    </form>
  </main>

<script src="../js/packages.js"></script>
</body>
</html>
