<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YogiTrack • Packages</title>

</head>

<body class="layout--sidebar">
  <aside class="sidebar">
    <a class="logo-wrap" href="all-in-one.html">
      <img src="../images/Logo.png" class="logo" alt="YogiTrack Logo">
    </a>

    <nav class="nav">

  <a href="all-in-one.html">All-In-One</a>
  <a href="dashboard.html">Dashboard</a>

    </nav>

  <main class="layout--center">
    <form class="card" id="packageForm">
      <h2>Assign Package</h2>

      <label>Customer
        <select id="customerId" class="form-input">
          <option value="">-- Select Customer --</option>
        </select>
      </label>

      <label>Package ID
        <select id="packageId" class="form-input">
          <option value="">-- Select Package --</option>
        </select>
      </label>

      <label>Package Name
        <input type="text" id="packageName" readonly>
      </label>

      <label>Description
        <textarea id="description" readonly></textarea>
      </label>

      <label>Price
        <input type="number" id="price" readonly>
      </label>

      <label>Classes Added
        <input type="number" id="classAmount" readonly>
      </label>

      <div class="btn-row">
        <button type="button" class="btn" id="searchBtn">Search</button>
        <button type="button" class="btn btn--primary" id="saveBtn">Assign Package</button>
        <button type="button" class="btn" id="clearBtn">Clear</button>
      </div>
    </form>
  </main>

  <script src="../js/packages.js"></script>
</body>
</html>
