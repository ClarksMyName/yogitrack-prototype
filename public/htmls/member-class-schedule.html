<body class="layout--sidebar">

  <main class="layout--center">
    <form class="card" id="classForm">
      <h2>Class Schedule</h2>

      <label>Class ID
        <select id="classId" class="form-input">
          <option value="">-- Select Class --</option>
        </select>
      </label>

      <label>Class Name
        <input type="text" id="className">
      </label>

      <label>Instructor ID
        <input type="text" id="instructorId">
      </label>

      <label>Class Type
        <input type="text" id="classType">
      </label>

      <label>Description
        <textarea id="description"></textarea>
      </label>

      <label>Day & Time
        <textarea id="daytime" placeholder="Example: Mon 09:00 (45 min)"></textarea>
      </label>

  </main>
