<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YogiTrack • Check-ins</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="layout--sidebar">

  <aside class="sidebar">
    <a class="logo-wrap" href="packages.html">
      <img src="../images/Logo.png" class="logo" alt="YogiTrack Logo">
    </a>

    <nav class="nav">
      <nav class="nav">
  <a href="member-dashboard.html">Dashboard</a>
  <a href="member-packages.html">Packages</a>
  <a href="member-class-schedule.html">Class Schedule</a>
  <a href="member-check-ins.html">Check-ins</a>
      <a href="member-profile.html">Profile</a>
  <a href="/logout">Log Out</a>
</nav>
    </nav>
  </aside>

  <main class="layout--center">
    <form class="card" id="checkinForm">
      <h2>Class Check-in</h2>

      <label>Class Name
        <select id="className" class="form-input">
          <option value="">-- Select Class --</option>
        </select>
      </label>

      <label>Customer ID
        <input type="text" id="customerId" readonly style="background-color: #e9ecef; cursor: not-allowed;">
      </label>

      <label>Date
        <input type="date" id="datetime">
      </label>

      <div class="btn-row">
        <button type="button" class="btn btn--primary" id="saveBtn">Check In</button>
        <button type="button" class="btn" id="clearBtn">Clear</button>
      </div>
    </form>
  </main>

  <script src="../js/checkins.js"></script>
</body>
</html>
